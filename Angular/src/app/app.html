<div class="min-h-screen flex flex-col items-stretch text-slate-100 font-sans antialiased overflow-x-hidden">
  
  <!-- Navbar -->
  <nav class="sticky top-0 z-50 backdrop-blur-md bg-slate-900/80 border-b border-slate-700/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-2 relative group">
          <span class="text-3xl select-none" style="filter: drop-shadow(0 0 8px rgba(168,85,247,0.6));">🦠</span>
          <span class="relative font-bold text-xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-violet-400">
            Covid-19
          </span>
        </div>
        <div class="hidden md:block">
          <div class="ml-10 flex items-baseline space-x-4">
            <a routerLink="/home" routerLinkActive="bg-slate-800 text-purple-400 font-medium border-b-2 border-purple-400" 
               [routerLinkActiveOptions]="{exact: true}"
               class="text-slate-300 hover:bg-slate-800 hover:text-purple-300 px-3 py-2 rounded-t-md transition-all text-sm font-medium border-b-2 border-transparent hover:border-purple-400/50">
              Inicio
            </a>
            <a routerLink="/dashboard" routerLinkActive="bg-slate-800 text-purple-400 font-medium border-b-2 border-purple-400" 
               [routerLinkActiveOptions]="{exact: true}"
               class="text-slate-300 hover:bg-slate-800 hover:text-purple-300 px-3 py-2 rounded-t-md transition-all text-sm font-medium border-b-2 border-transparent hover:border-purple-400/50">
              Resumen Global
            </a>
            <a routerLink="/region" routerLinkActive="bg-slate-800 text-purple-400 font-medium border-b-2 border-purple-400"
               class="text-slate-300 hover:bg-slate-800 hover:text-purple-300 px-3 py-2 rounded-t-md transition-all text-sm font-medium border-b-2 border-transparent hover:border-purple-400/50">
              Análisis Geográfico
            </a>
          </div>
        </div>

      </div>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="flex-grow w-full">
    <div class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-700/50 mt-auto py-6 backdrop-blur-sm bg-slate-900/40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center text-slate-500 text-sm">
      <p>
        © 2026 Covid-19
      </p>
    </div>
  </footer>
</div>
